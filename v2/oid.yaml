data_types:
  - integer
  - ipaddress
  - macaddress
  - octetstring
  - objectid

system:
  description:
    request_type: get
    oid: 1.3.6.1.2.1.1.1.0
    value_type: octetstring
  private_oid:
    request_type: get
    oid: 1.3.6.1.2.1.1.2.0
    value_type: objectid
    values:
      1.3.6.1.4.1.171.10.63.6: DES-3028
  standard_mib_modules:
    request_type: walk
    oid: 1.3.6.1.2.1.1.9.1.3
    value_type: octetstring

models:
  base_models:
    - DES-3028
    - DES-3200-28
    - DES-3526
    - DGS-3000-24TC
    - DGS-3200-24
    - DGS-1210-28/ME
    - DGS-3120-24TC

  L2_switch_defaults: &L2_switch_defaults
    first_gigabit_port: 1
    combo_ports: !!set {}
    fiber_ports: !!set {}
    are_cable_diagnostics_pairs_ordered: false
  
  # L2
  DES-3028:
    <<: *L2_switch_defaults
    base_model: DES-3028
    ports_count: 28
    first_gigabit_port: 25
    combo_ports: !!set { ? 25, ? 26 }
    are_cable_diagnostics_pairs_ordered: true
    firmware_release: 2.94

    oids:
      private_mib_modules:
        description:
          request_type: walk
          oid: 1.3.6.1.4.1.171.12.1.1.2.1.2
          value_type: octetstring
        version:
          request_type: walk
          oid: 1.3.6.1.4.1.171.12.1.1.2.1.3
          value_type: integer
        value_type:
          request_type: walk
          oid: 1.3.6.1.4.1.171.12.1.1.2.1.4
          value_type: integer
          values:
            1: other
            2: standard
            3: proprietary
            4: experiment

      switch:
        # reboot, reset
        system_reboot_mode:
          request_type: set
          oid: 1.3.6.1.4.1.171.11.63.6.2.1.2.1.0
          value_type: integer
          values:
            1: other
            2: reboot
            3: save_config_and_reboot
            4: reset_config_and_reboot
        
        # save
        save_action:
          request_type: set
          oid: 1.3.6.1.4.1.171.12.1.2.6.0
          value_type: integer
          values:
            1: other
            2: config_id1
            3: config_id2
            4: log
            5: all
        save_status:
          request_type: get
          oid: 1.3.6.1.4.1.171.12.1.1.4.0
          value_type: integer
          values:
            1: other
            2: proceeding
            3: completed
            4: failed

        # network parameters
        ip:
          request_type: set
          oid: 1.3.6.1.4.1.171.11.63.6.2.1.2.2.0
          value_type: ipaddress
        mask:
          request_type: set
          oid: 1.3.6.1.4.1.171.11.63.6.2.1.2.3.0
          value_type: ipaddress
        default_gateway:
          request_type: set
          oid: 1.3.6.1.4.1.171.11.63.6.2.1.2.4.0
          value_type: ipaddress
        management_vlan_id:
          request_type: set
          oid: 1.3.6.1.4.1.171.11.63.6.2.1.2.5.0
          value_type: integer
        
        # mac address
        mac_address:
          request_type: get
          oid: 1.3.6.1.2.1.17.1.1.0
          value_type: macaddress
        
        # ports number
        ports_number:
          request_type: get
          oid: 1.3.6.1.2.1.17.1.2.0
          value_type: integer
        
        # time
        current_time:
          request_type: set
          oid: 1.3.6.1.4.1.171.12.10.2.0
          value_type: octetstring
          bytes_pattern: "2111111"   # %Y%Y%M%D%h%m%s%ms, each letter is one byte
        
        # cpu utilization
        cpu_utilization_5sec:
          request_type: get
          oid: 1.3.6.1.4.1.171.12.1.1.6.1.0
          value_type: integer
        cpu_utilization_1min:
          request_type: get
          oid: 1.3.6.1.4.1.171.12.1.1.6.2.0
          value_type: integer
        cpu_utilization_5min:
          request_type: get
          oid: 1.3.6.1.4.1.171.12.1.1.6.3.0
          value_type: integer
        
        # dram utilization
        dram_total:
          request_type: get
          oid: 1.3.6.1.4.1.171.12.1.1.9.1.2.1
          value_type: integer
        dram_used:
          request_type: get
          oid: 1.3.6.1.4.1.171.12.1.1.9.1.3.1
          value_type: integer
        dram_utilization:
          request_type: get
          oid: 1.3.6.1.4.1.171.12.1.1.9.1.4.1
          value_type: integer

        # clear counters
        clear_all_counters:
          request_type: get
          oid: 1.3.6.1.4.1.171.11.63.6.2.1.2.12.0
          value_type: integer
          values:
            1: normal
            2: active

      trusted_host:
        ip:
          request_type: walk
          oid: 1.3.6.1.4.1.171.12.1.2.10.1.1.2
          value_type: ipaddress
        mask:
          request_type: walk
          oid: 1.3.6.1.4.1.171.12.1.2.10.1.1.4
          value_type: ipaddress
        entry_status:
          request_type: set
          oid: 1.3.6.1.4.1.171.12.1.2.10.1.1.3.{host_index}
          value_type: integer
          values:
            1: active
            2: not_in_service
            3: not_ready
            4: create_and_go
            5: create_and_wait
            6: destroy
        delete_all:
          request_type: set
          oid: 1.3.6.1.4.1.171.12.1.2.10.2.0
          value_type: integer
          values:
            1: none
            2: start
      
      acl_mask:
        # ethernet acl
        ethernet_use_vlan:
          request_type: walk
          oid: 1.3.6.1.4.1.171.12.9.2.1.1.2
          value_type: integer
          values:
            1: enabled
            2: disabled
        ethernet_mac_mask_state:
          request_type: walk
          oid: 1.3.6.1.4.1.171.12.9.2.1.1.3
          value_type: integer
          values:
            1: other
            2: destination_mac
            3: source_mac
            4: destination_source_mac
        ethernet_source_mac_mask:
          request_type: walk
          oid: 1.3.6.1.4.1.171.12.9.2.1.1.4
          value_type: macaddress
        ethernet_destination_mac_mask:
          request_type: walk
          oid: 1.3.6.1.4.1.171.12.9.2.1.1.5
          value_type: macaddress
        ethernet_use_802_1p:
          request_type: walk
          oid: 1.3.6.1.4.1.171.12.9.2.1.1.6
          value_type: integer
          values:
            1: enabled
            2: disabled
        ethernet_use_ethernet_type:
          request_type: walk
          oid: 1.3.6.1.4.1.171.12.9.2.1.1.7
          value_type: integer
          values:
            1: enabled
            2: disabled
        ethernet_owner:
          request_type: walk
          oid: 1.3.6.1.4.1.171.12.9.2.1.1.9
          value_type: integer
          values:
            1: any
            2: acl
            3: ipbind
            4: other
            5: dhcp
            6: netbios
            7: ext-netbios

        # packet content acl
        packet_content_offset_0_15:
          request_type: walk
          oid: 1.3.6.1.4.1.171.12.9.2.3.1.2
          value_type: octetstring
        packet_content_offset_16_31:
          request_type: walk
          oid: 1.3.6.1.4.1.171.12.9.2.3.1.3
          value_type: octetstring
        packet_content_offset_32_47:
          request_type: walk
          oid: 1.3.6.1.4.1.171.12.9.2.3.1.4
          value_type: octetstring
        packet_content_offset_48_63:
          request_type: walk
          oid: 1.3.6.1.4.1.171.12.9.2.3.1.5
          value_type: octetstring
        packet_content_offset_64_79:
          request_type: walk
          oid: 1.3.6.1.4.1.171.12.9.2.3.1.6
          value_type: octetstring
        packet_content_owner:
          request_type: walk
          oid: 1.3.6.1.4.1.171.12.9.2.3.1.8
          value_type: integer
          values:
            1: any
            2: acl
            3: ipbind
            4: other
            5: dhcp
            6: netbios
            7: ext-netbios
      
      acl_rule:
        # ethernet acl
        ethernet_vlan_name:
          request_type: walk
          oid: 1.3.6.1.4.1.171.12.9.3.1.1.3
          value_type: octetstring
        ethernet_source_mac:
          request_type: walk
          oid: 1.3.6.1.4.1.171.12.9.3.1.1.4
          value_type: macaddress
        ethernet_destination_mac:
          request_type: walk
          oid: 1.3.6.1.4.1.171.12.9.3.1.1.5
          value_type: macaddress
        ethernet_802_1p:   # specifies which packets will be scanned depending on their priority
          request_type: walk
          oid: 1.3.6.1.4.1.171.12.9.3.1.1.6
          value_type: integer
        ethernet_ethernet_type:
          request_type: walk
          oid: 1.3.6.1.4.1.171.12.9.3.1.1.7
          value_type: octetstring
        ethernet_enable_local_priority:   # enables local priority for scanned packets
          request_type: walk
          oid: 1.3.6.1.4.1.171.12.9.3.1.1.8
          value_type: integer
          values:
            1: enabled
            2: disabled
        ethernet_local_priority:   # specifies local priority that will last during inner switch commutation
          request_type: walk
          oid: 1.3.6.1.4.1.171.12.9.3.1.1.9
          value_type: integer
        ethernet_permit:   # action
          request_type: walk
          oid: 1.3.6.1.4.1.171.12.9.3.1.1.13
          value_type: integer
          values:
            1: deny
            2: permit
        ethernet_ports:
          request_type: walk
          oid: 1.3.6.1.4.1.171.12.9.3.1.1.14
          value_type: octetstring
        ethernet_owner:
          request_type: walk
          oid: 1.3.6.1.4.1.171.12.9.3.1.1.16
          value_type: integer
          values:
            1: any
            2: acl
            3: ipbind
            4: other
            5: dhcp
            6: netbios
            7: ext-netbios
        ethernet_rx_rate:
          request_type: walk
          oid: 1.3.6.1.4.1.171.12.9.3.1.1.17
          value_type: integer
        
        # packet content acl
        packet_content_offset_index_1: &offset_index   # actual byte offset
          request_type: walk
          oid: 1.3.6.1.4.1.171.12.9.3.9.1.8
          value_type: integer
        packet_content_offset_mask_1: &offset_mask
          request_type: walk
          oid: 1.3.6.1.4.1.171.12.9.3.9.1.9
          value_type: octetstring
        packet_content_offset_data_1: &offset_data
          request_type: walk
          oid: 1.3.6.1.4.1.171.12.9.3.9.1.10
          value_type: octetstring
        packet_content_offset_index_2:   # actual byte offset
          <<: *offset_index
          oid: 1.3.6.1.4.1.171.12.9.3.9.1.11
        packet_content_offset_mask_2:
          <<: *offset_mask
          oid: 1.3.6.1.4.1.171.12.9.3.9.1.12
        packet_content_offset_data_2:
          <<: *offset_data
          oid: 1.3.6.1.4.1.171.12.9.3.9.1.13
        packet_content_offset_index_3:   # actual byte offset
          <<: *offset_index
          oid: 1.3.6.1.4.1.171.12.9.3.9.1.14
        packet_content_offset_mask_3:
          <<: *offset_mask
          oid: 1.3.6.1.4.1.171.12.9.3.9.1.15
        packet_content_offset_data_3:
          <<: *offset_data
          oid: 1.3.6.1.4.1.171.12.9.3.9.1.16
        packet_content_offset_index_4:   # actual byte offset
          <<: *offset_index
          oid: 1.3.6.1.4.1.171.12.9.3.9.1.17
        packet_content_offset_mask_4:
          <<: *offset_mask
          oid: 1.3.6.1.4.1.171.12.9.3.9.1.18
        packet_content_offset_data_4:
          <<: *offset_data
          oid: 1.3.6.1.4.1.171.12.9.3.9.1.19
        packet_content_offset_index_5:   # actual byte offset
          <<: *offset_index
          oid: 1.3.6.1.4.1.171.12.9.3.9.1.20
        packet_content_offset_mask_5:
          <<: *offset_mask
          oid: 1.3.6.1.4.1.171.12.9.3.9.1.21
        packet_content_offset_data_5:
          <<: *offset_data
          oid: 1.3.6.1.4.1.171.12.9.3.9.1.22
        packet_content_enable_local_priority:   # enables local priority for scanned packets
          request_type: walk
          oid: 1.3.6.1.4.1.171.12.9.3.9.1.23
          value_type: integer
          values:
            1: enabled
            2: disabled
        packet_content_local_priority:   # specifies local priority that will last during inner switch commutation
          request_type: walk
          oid: 1.3.6.1.4.1.171.12.9.3.9.1.24
          value_type: integer
        packet_content_permit:   # action
          request_type: walk
          oid: 1.3.6.1.4.1.171.12.9.3.9.1.29
          value_type: integer
          values:
            1: deny
            2: permit
        packet_content_ports:
          request_type: walk
          oid: 1.3.6.1.4.1.171.12.9.3.9.1.30
          value_type: octetstring
        packet_content_rx_rate:
          request_type: walk
          oid: 1.3.6.1.4.1.171.12.9.3.9.1.28
          value_type: integer

      vlan:
        # walk through all vlans
        all_names:
          request_type: walk
          oid: 1.3.6.1.2.1.17.7.1.4.3.1.1
          value_type: octetstring
        all_egress_ports:
          request_type: walk
          oid: 1.3.6.1.2.1.17.7.1.4.3.1.2
          value_type: octetstring
        all_untagged_ports:
          request_type: walk
          oid: 1.3.6.1.2.1.17.7.1.4.3.1.4
          value_type: octetstring
        
        # manage exact vlan
        entry_status:
          request_type: set
          oid: 1.3.6.1.2.1.17.7.1.4.3.1.5.{vlan_id}
          value_type: integer
          values:
            1: active
            2: not_in_service
            3: not_ready
            4: create_and_go
            5: create_and_wait
            6: destroy
        name:
          request_type: set
          oid: 1.3.6.1.2.1.17.7.1.4.3.1.1.{vlan_id}
          value_type: octetstring
        egress_ports:
          request_type: set
          oid: 1.3.6.1.2.1.17.7.1.4.3.1.2.{vlan_id}
          value_type: octetstring
        untagged_ports:
          request_type: set
          oid: 1.3.6.1.2.1.17.7.1.4.3.1.4.{vlan_id}
          value_type: octetstring

      fdb:
        port:
          request_type: walk
          oid: 1.3.6.1.2.1.17.7.1.2.2.1.2
          value_type: integer
        status:
          request_type: walk
          oid: 1.3.6.1.2.1.17.7.1.2.2.1.3
          value_type: integer
          values:
            1: other
            2: invalid
            3: learned
            4: self
            5: management
        clear_all:
          request_type: set
          oid: 1.3.6.1.4.1.171.12.1.2.11.1.0
          value_type: integer
          values:
            1: other
            2: start

      flood_fdb:
        state:
          request_type: set
          oid: 1.3.6.1.4.1.171.11.63.6.2.25.1.1.1.0
          value_type: integer
          values:
            1: enabled
            2: disabled
        clear:
          request_type: set
          oid: 1.3.6.1.4.1.171.11.63.6.2.25.1.1.4.0
          value_type: integer
          values:
            1: no_action
            2: start
        status:
          request_type: walk
          oid: 1.3.6.1.4.1.171.11.63.6.2.25.2.1.1.4
          value_type: integer
          values:
            1: active
            2: inactive
        timestamp:
          request_type: walk
          oid: 1.3.6.1.4.1.171.11.63.6.2.25.2.1.1.5
          value_type: integer
      
      ipif:
        # now is used to match if_index with ipif name System
        name:
          request_type: get
          oid: 1.3.6.1.2.1.31.1.1.1.1.{if_index}
          value_type: octetstring

      dhcp_relay:
        # main settings
        state:
          request_type: set
          oid: 1.3.6.1.4.1.171.12.42.1.1.0
          value_type: integer
          values:
            1: enabled
            2: disabled
        hop_count:
          request_type: set
          oid: 1.3.6.1.4.1.171.12.42.1.2.0
          value_type: integer
        time_threshold:
          request_type: set
          oid: 1.3.6.1.4.1.171.12.42.1.3.0
          value_type: integer
        
        # option82 settings
        option82_state:
          request_type: set
          oid: 1.3.6.1.4.1.171.12.42.3.2.1.0
          value_type: integer
          values:
            1: enabled
            2: disabled
        option82_check_state:
          request_type: set
          oid: 1.3.6.1.4.1.171.12.42.3.2.2.0
          value_type: integer
          values:
            1: enabled
            2: disabled
        option82_policy:
          request_type: set
          oid: 1.3.6.1.4.1.171.12.42.3.2.3.0
          value_type: integer
          values:
            1: replace
            2: drop
            3: keep
        option82_remote_id_type:
          request_type: set
          oid: 1.3.6.1.4.1.171.12.42.3.2.4.0
          value_type: integer
          values:
            1: default
            2: user_defined
        option82_remote_id:
          request_type: set
          oid: 1.3.6.1.4.1.171.12.42.3.2.5.0
          value_type: octetstring
        
        # ipif - servers
        ipif_server:
          request_type: walk
          oid: 1.3.6.1.4.1.171.12.42.3.1.1.1
          value_type: octetstring
        ipif_server_entry_status:
          request_type: set
          oid: 1.3.6.1.4.1.171.12.42.3.1.1.3.{ipif_name_in_oid}.{dhcp_server}
          value_type: integer
          values:
            1: active
            2: not_in_service
            3: not_ready
            4: create_and_go
            5: create_and_wait
            6: destroy
      
      # arpentry
      arp:
        mac_address:
          request_type: walk
          oid: 1.3.6.1.2.1.4.22.1.2
          value_type: macaddress
        status:
          request_type: walk
          oid: 1.3.6.1.2.1.4.22.1.4
          value_type: integer
          values:
            1: other
            2: invalid
            3: dynamic
            4: static

      port:
        # basic port management
        combo_ports_oids: !!set   # technical information about oids separated for combo ports
          ? admin_state
          ? speed_duplex_settings
          ? flow_control
          ? address_learning
          ? mdix_state
          ? link_status
          ? speed_duplex_status
        admin_state: &admin_state
          request_type: set
          oid: 1.3.6.1.4.1.171.11.63.6.2.2.2.1.3.{port}.100
          value_type: integer
          values:
            1: other
            2: disabled
            3: enabled
        admin_state_combo_fiber:
          <<: *admin_state
          oid: 1.3.6.1.4.1.171.11.63.6.2.2.2.1.3.{port}.101
        speed_duplex_settings: &speed_duplex_settings
          request_type: set
          oid: 1.3.6.1.4.1.171.11.63.6.2.2.2.1.4.{port}.100
          value_type: integer
          values:
            1: auto
            2: 10M/Half
            3: 10M/Full
            4: 100M/Half
            5: 100M/Full
            7: 1000M/Full
            8: 1000M/Full_Master
            9: 1000M/Full_Slave
        speed_duplex_settings_combo_fiber:
          <<: *speed_duplex_settings
          oid: 1.3.6.1.4.1.171.11.63.6.2.2.2.1.4.{port}.101
        flow_control: &flow_control
          request_type: set
          oid: 1.3.6.1.4.1.171.11.63.6.2.2.2.1.5.{port}.100
          value_type: integer
          values:
            1: other
            2: disabled
            3: enabled
        flow_control_combo_fiber:
          <<: *flow_control
          oid: 1.3.6.1.4.1.171.11.63.6.2.2.2.1.5.{port}.101
        address_learning: &address_learning
          request_type: set
          oid: 1.3.6.1.4.1.171.11.63.6.2.2.2.1.7.{port}.100
          value_type: integer
          values:
            1: other
            2: disabled
            3: enabled
        address_learning_combo_fiber:
          <<: *address_learning
          oid: 1.3.6.1.4.1.171.11.63.6.2.2.2.1.7.{port}.101
        mdix_state: &mdix_state
          request_type: set
          oid: 1.3.6.1.4.1.171.11.63.6.2.2.2.1.10.{port}.100
          value_type: integer
          values:
            1: auto
            2: normal
            3: cross
            4: other
        mdix_state_combo_fiber:
          <<: *mdix_state
          oid: 1.3.6.1.4.1.171.11.63.6.2.2.2.1.10.{port}.101
        
        # basic port info
        link_status: &link_status
          request_type: get
          oid: 1.3.6.1.4.1.171.11.63.6.2.2.1.1.4.{port}.100
          value_type: integer
          values:
            1: other
            2: link_pass
            3: link_fail
        link_status_combo_fiber:
          <<: *link_status
          oid: 1.3.6.1.4.1.171.11.63.6.2.2.1.1.4.{port}.101
        speed_duplex_status: &speed_duplex_status
          request_type: get
          oid: 1.3.6.1.4.1.171.11.63.6.2.2.1.1.5.{port}.100
          value_type: integer
          values:
            1: auto
            2: 10M/Half
            3: 10M/Full
            4: 100M/Half
            5: 100M/Full
            6: 1000M/Half
            7: 1000M/Full
        speed_duplex_status_combo_fiber:
          <<: *speed_duplex_status
