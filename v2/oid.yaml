data_types:
  - integer
  - ipaddress
  - macaddress
  - octetstring
  - objectid

system:
  description:
    request_type: get
    oid: 1.3.6.1.2.1.1.1.0
    value_type: octetstring
  private_oid:
    request_type: get
    oid: 1.3.6.1.2.1.1.2.0
    value_type: objectid
    values:
      1.3.6.1.4.1.171.10.63.6: DES-3028
  standard_mib_modules:
    request_type: walk
    oid: 1.3.6.1.2.1.1.9.1.3
    value_type: octetstring

models:
  base_models:
    - DES-3028
    - DES-3200-28
    - DES-3526
    - DGS-3000-24TC
    - DGS-3200-24
    - DGS-1210-28/ME
    - DGS-3120-24TC

  L2_switch_defaults: &L2_switch_defaults
    first_gigabit_port: 1
    combo_ports: !!set {}
    fiber_ports: !!set {}
    are_cable_diagnostics_pairs_ordered: false
  
  # L2
  DES-3028:
    <<: *L2_switch_defaults
    base_model: DES-3028
    ports_count: 28
    first_gigabit_port: 25
    combo_ports: !!set { ? 25, ? 26 }
    are_cable_diagnostics_pairs_ordered: true
    firmware_release: 2.94

    oids:
      private_mib_modules:
        description:
          request_type: walk
          oid: 1.3.6.1.4.1.171.12.1.1.2.1.2
          value_type: octetstring
        version:
          request_type: walk
          oid: 1.3.6.1.4.1.171.12.1.1.2.1.3
          value_type: integer
        value_type:
          request_type: walk
          oid: 1.3.6.1.4.1.171.12.1.1.2.1.4
          value_type: integer
          values:
            1: other
            2: standard
            3: proprietary
            4: experiment

      switch:
        # L2-L3 characteristics
        ip:
          request_type: set
          oid: 1.3.6.1.4.1.171.11.63.6.2.1.2.2.0
          value_type: ipaddress
        mask:
          request_type: set
          oid: 1.3.6.1.4.1.171.11.63.6.2.1.2.3.0
          value_type: ipaddress
        default_gateway:
          request_type: set
          oid: 1.3.6.1.4.1.171.11.63.6.2.1.2.4.0
          value_type: ipaddress
        management_vlan_id:
          request_type: set
          oid: 1.3.6.1.4.1.171.11.63.6.2.1.2.5.0
          value_type: integer
        mac_address:
          request_type: get
          oid: 1.3.6.1.2.1.17.1.1.0
          value_type: macaddress
        ports_number:
          request_type: get
          oid: 1.3.6.1.2.1.17.1.2.0
          value_type: integer
        
        # time
        current_time:
          request_type: set
          oid: 1.3.6.1.4.1.171.12.10.2.0
          value_type: octetstring
          bytes_pattern: "2111111"   # %Y%Y%M%D%h%m%s%ms
        
        # utilization
        cpu_utilization_5sec:
          request_type: get
          oid: 1.3.6.1.4.1.171.12.1.1.6.1.0
          value_type: integer
        cpu_utilization_1min:
          request_type: get
          oid: 1.3.6.1.4.1.171.12.1.1.6.2.0
          value_type: integer
        cpu_utilization_5min:
          request_type: get
          oid: 1.3.6.1.4.1.171.12.1.1.6.3.0
          value_type: integer
        total_dram:
          request_type: get
          oid: 1.3.6.1.4.1.171.12.1.1.9.1.2.1
          value_type: integer
        used_dram:
          request_type: get
          oid: 1.3.6.1.4.1.171.12.1.1.9.1.3.1
          value_type: integer
        dram_utilization:
          request_type: get
          oid: 1.3.6.1.4.1.171.12.1.1.9.1.4.1
          value_type: integer
      
      dhcp_relay:
        state:
          request_type: set
          oid: 1.3.6.1.4.1.171.12.42.1.1.0
          value_type: integer
          values:
            1: enabled
            2: disabled
        interface_name_for_server:
          request_type: walk
          oid: 1.3.6.1.4.1.171.12.42.3.1.1.1
          value_type: octetstring
        option82_state:
          request_type: set
          oid: 1.3.6.1.4.1.171.12.42.3.2.1.0
          value_type: integer
          values:
            1: enabled
            2: disabled
        option82_check_state:
          request_type: set
          oid: 1.3.6.1.4.1.171.12.42.3.2.2.0
          value_type: integer
          values:
            1: enabled
            2: disabled
        option82_policy:
          request_type: set
          oid: 1.3.6.1.4.1.171.12.42.3.2.3.0
          value_type: integer
          values:
            1: replace
            2: drop
            3: keep
        option82_remote_id_type:
          request_type: set
          oid: 1.3.6.1.4.1.171.12.42.3.2.4.0
          value_type: integer
          values:
            1: default
            2: user-defined
      
      vlan:
        # walk through all vlans
        all_names:
          request_type: walk
          oid: 1.3.6.1.2.1.17.7.1.4.3.1.1
          value_type: octetstring
        
        # manage exact vlan
        entry_status:
          request_type: set
          oid: 1.3.6.1.2.1.17.7.1.4.3.1.5.{vlan_id}
          value_type: integer
          values:
            1: active
            2: not_in_service
            3: not_ready
            4: create_go
            5: create_wait
            6: destroy
        name:
          request_type: set
          oid: 1.3.6.1.2.1.17.7.1.4.3.1.1.{vlan_id}
          value_type: octetstring
        egress_ports:
          request_type: set
          oid: 1.3.6.1.2.1.17.7.1.4.3.1.2.{vlan_id}
          value_type: octetstring
        untagged_ports:
          request_type: set
          oid: 1.3.6.1.2.1.17.7.1.4.3.1.4.{vlan_id}
          value_type: octetstring

      fdb:
        port:
          request_type: walk
          oid: 1.3.6.1.2.1.17.7.1.2.2.1.2
          value_type: integer
        status:
          request_type: walk
          oid: 1.3.6.1.2.1.17.7.1.2.2.1.3
          value_type: integer
          values:
            1: other
            2: invalid
            3: learned
            4: self
            5: management
      
      port:
        # basic port management
        combo_ports_oids: !!set   # technical information about oids separated for combo ports
          ? admin_state
          ? speed_duplex_settings
          ? flow_control
          ? address_learning
          ? mdix_state
          ? link_status
          ? speed_duplex_status
        admin_state: &admin_state
          request_type: set
          oid: 1.3.6.1.4.1.171.11.63.6.2.2.2.1.3.{port}.100
          value_type: integer
          values:
            1: other
            2: disabled
            3: enabled
        admin_state_combo_fiber:
          <<: *admin_state
          oid: 1.3.6.1.4.1.171.11.63.6.2.2.2.1.3.{port}.101
        speed_duplex_settings: &speed_duplex_settings
          request_type: set
          oid: 1.3.6.1.4.1.171.11.63.6.2.2.2.1.4.{port}.100
          value_type: integer
          values:
            1: auto
            2: 10M/Half
            3: 10M/Full
            4: 100M/Half
            5: 100M/Full
            7: 1000M/Full
            8: 1000M/Full_Master
            9: 1000M/Full_Slave
        speed_duplex_settings_combo_fiber:
          <<: *speed_duplex_settings
          oid: 1.3.6.1.4.1.171.11.63.6.2.2.2.1.4.{port}.101
        flow_control: &flow_control
          request_type: set
          oid: 1.3.6.1.4.1.171.11.63.6.2.2.2.1.5.{port}.100
          value_type: integer
          values:
            1: other
            2: disabled
            3: enabled
        flow_control_combo_fiber:
          <<: *flow_control
          oid: 1.3.6.1.4.1.171.11.63.6.2.2.2.1.5.{port}.101
        address_learning: &address_learning
          request_type: set
          oid: 1.3.6.1.4.1.171.11.63.6.2.2.2.1.7.{port}.100
          value_type: integer
          values:
            1: other
            2: disabled
            3: enabled
        address_learning_combo_fiber:
          <<: *address_learning
          oid: 1.3.6.1.4.1.171.11.63.6.2.2.2.1.7.{port}.101
        mdix_state: &mdix_state
          request_type: set
          oid: 1.3.6.1.4.1.171.11.63.6.2.2.2.1.10.{port}.100
          value_type: integer
          values:
            1: auto
            2: normal
            3: cross
            4: other
        mdix_state_combo_fiber:
          <<: *mdix_state
          oid: 1.3.6.1.4.1.171.11.63.6.2.2.2.1.10.{port}.101
        link_status: &link_status
          request_type: get
          oid: 1.3.6.1.4.1.171.11.63.6.2.2.1.1.4.{port}.100
          value_type: integer
          values:
            1: other
            2: link_pass
            3: link_fail
        link_status_combo_fiber:
          <<: *link_status
          oid: 1.3.6.1.4.1.171.11.63.6.2.2.1.1.4.{port}.101
        speed_duplex_status: &speed_duplex_status
          request_type: get
          oid: 1.3.6.1.4.1.171.11.63.6.2.2.1.1.5.{port}.100
          value_type: integer
          values:
            1: auto
            2: 10M/Half
            3: 10M/Full
            4: 100M/Half
            5: 100M/Full
            6: 1000M/Half
            7: 1000M/Full
        speed_duplex_status_combo_fiber:
          <<: *speed_duplex_status
          oid: 1.3.6.1.4.1.171.11.63.6.2.2.1.1.5.{port}.101
        
        # port_security
        port_security_max_learning_addresses:
          request_type: set
          oid: 1.3.6.1.4.1.171.11.63.6.2.15.1.1.2.{port}
          value_type: integer
        port_security_lock_address_mode:
          request_type: set
          oid: 1.3.6.1.4.1.171.11.63.6.2.15.1.1.3.{port}
          value_type: integer
          values:
            1: other
            2: permanent
            3: deleteOnTimeout
            4: deleteOnReset
        port_security_admin_state:
          request_type: set
          oid: 1.3.6.1.4.1.171.11.63.6.2.15.1.1.4.{port}
          value_type: integer
          values:
            1: other
            2: enable
            3: disable
        
        # cable diagnostics
        cable_diagnostics_action:
          request_type: set
          oid: 1.3.6.1.4.1.171.12.58.1.1.1.12.{port}
          value_type: integer
          values:
            1: action
            2: processing
            3: other
        cable_diagnostics_pair_status_defaults: &cable_diagnostics_pair_status_defaults
          request_type: get
          value_type: integer
          values:
            0: ok
            1: open
            2: short
            3: open_short
            4: crosstalk
            5: unknown
            6: count
            7: no_cable
            8: other
        cable_diagnostics_pair1_status:
          <<: *cable_diagnostics_pair_status_defaults
          oid: 1.3.6.1.4.1.171.12.58.1.1.1.4.{port}
        cable_diagnostics_pair2_status:
          <<: *cable_diagnostics_pair_status_defaults
          oid: 1.3.6.1.4.1.171.12.58.1.1.1.5.{port}
        cable_diagnostics_pair3_status:
          <<: *cable_diagnostics_pair_status_defaults
          oid: 1.3.6.1.4.1.171.12.58.1.1.1.6.{port}
        cable_diagnostics_pair4_status:
          <<: *cable_diagnostics_pair_status_defaults
          oid: 1.3.6.1.4.1.171.12.58.1.1.1.7.{port}
        cable_diagnostics_pair1_length:
          request_type: get
          oid: 1.3.6.1.4.1.171.12.58.1.1.1.8.{port}
          value_type: integer
        cable_diagnostics_pair2_length:
          request_type: get
          oid: 1.3.6.1.4.1.171.12.58.1.1.1.9.{port}
          value_type: integer
        cable_diagnostics_pair3_length:
          request_type: get
          oid: 1.3.6.1.4.1.171.12.58.1.1.1.10.{port}
          value_type: integer
        cable_diagnostics_pair4_length:
          request_type: get
          oid: 1.3.6.1.4.1.171.12.58.1.1.1.11.{port}
          value_type: integer
        
        # port utilization
        utilization_tx_frames:
          request_type: get
          oid: 1.3.6.1.4.1.171.12.1.1.8.1.2.{port}
          value_type: integer
        utilization_rx_frames:
          request_type: get
          oid: 1.3.6.1.4.1.171.12.1.1.8.1.3.{port}
          value_type: integer
        utilization_percentage:
          request_type: get
          oid: 1.3.6.1.4.1.171.12.1.1.8.1.4.{port}
          value_type: integer
        
        # traffic control
        traffic_control_threshold:
          request_type: set
          oid: 1.3.6.1.4.1.171.12.25.3.1.1.2.{port}
          value_type: integer
        traffic_control_broadcast_status:
          request_type: set
          oid: 1.3.6.1.4.1.171.12.25.3.1.1.3.{port}
          value_type: integer
          values:
            1: disabled
            2: enabled
        traffic_control_multicast_status:
          request_type: set
          oid: 1.3.6.1.4.1.171.12.25.3.1.1.4.{port}
          value_type: integer
          values:
            1: disabled
            2: enabled
        traffic_control_unicast_status:
          request_type: set
          oid: 1.3.6.1.4.1.171.12.25.3.1.1.5.{port}
          value_type: integer
          values:
            1: disabled
            2: enabled
        traffic_control_action_status:
          request_type: set
          oid: 1.3.6.1.4.1.171.12.25.3.1.1.6.{port}
          value_type: integer
          values:
            1: shutdown
            2: drop
        traffic_control_count_down:
          request_type: set
          oid: 1.3.6.1.4.1.171.12.25.3.1.1.7.{port}
          value_type: integer
        traffic_control_time_interval:
          request_type: set
          oid: 1.3.6.1.4.1.171.12.25.3.1.1.8.{port}
          value_type: integer
  
  DES-3052:
    <<: *L2_switch_defaults
    base_model: DES-3028
    ports_count: 52
    first_gigabit_port: 49
    are_cable_diagnostics_pairs_ordered: true
    combo_ports: !!set { ? 49, ? 50 }
  
  DES-3200-28:
    <<: *L2_switch_defaults
    base_model: DES-3200-28
    ports_count: 28
    first_gigabit_port: 25
    are_cable_diagnostics_pairs_ordered: true
    combo_ports: !!set { ? 25, ? 26, ? 27, ? 28 }
  
  DES-3526: # may be unused
    <<: *L2_switch_defaults
    base_model: DES-3526
    ports_count: 26
    first_gigabit_port: 25
    are_cable_diagnostics_pairs_ordered: true
    combo_ports: !!set { ? 25, ? 26 }
  
  DGS-3000-24TC:
    <<: *L2_switch_defaults
    base_model: DGS-3000-24TC
    ports_count: 24
    combo_ports: !!set { ? 21, ? 22, ? 23, ? 24 }
  
  DGS-3000-26TC:
    <<: *L2_switch_defaults
    base_model: DGS-3000-24TC
    ports_count: 24
    combo_ports: !!set { ? 21, ? 22, ? 23, ? 24 }
  
  DGS-3200-24:
    <<: *L2_switch_defaults
    base_model: DGS-3200-24
    ports_count: 24
    combo_ports: !!set { ? 21, ? 22, ? 23, ? 24 }
  
  DGS-1210-28/ME:
    base_model: DGS-1210-28/ME
    ports_count: 28
    fiber_ports: !!set { ? 25, ? 26, ? 27, ? 28 }
  
  DGS-1210-52/ME:
    <<: *L2_switch_defaults
    base_model: DGS-1210-28/ME
    ports_count: 52
    fiber_ports: !!set { ? 49, ? 50, ? 51, ? 52 }
  
  # L2+
  DGS-3120-24TC:
    <<: *L2_switch_defaults
    base_model: DGS-3120-24TC
    ports_count: 24
    combo_ports: !!set { ? 21, ? 22, ? 23, ? 24 }
  
  # L3
  DGS-3120-24SC: {}

  DGS-3620-28TC: {}

  DGS-3620-28SC: {}

  DGS-3627G: {}

  DGS-3630-28SC: {}   # cisco-like