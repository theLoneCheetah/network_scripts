        tx_broadcast_packets:
          request_type: get
          oid: 1.3.6.1.2.1.31.1.1.1.13.{port}
          value_type: integer
        
        # error statistics
        alignment_errors:
          request_type: get
          oid: 1.3.6.1.2.1.10.7.2.1.2.{port}
          value_type: integer
        fcs_errors:
          request_type: get
          oid: 1.3.6.1.2.1.10.7.2.1.3.{port}
          value_type: integer
  
